<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=./ai-native-site/index.html">
<title>AI Native Learning Program</title>
<style>
  :root {
    --bg: #f7f7fb;
    --surface: #ffffff;
    --text: #1a1a2e;
    --muted: #6b6b80;
    --accent: #5b52f0;
    --border: #e4e4ed;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(180deg, #f8f6ff 0%, var(--bg) 100%);
    color: var(--text);
  }
  .card {
    max-width: 620px;
    padding: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
  }
  h1 { margin: 0 0 12px; font-size: 2rem; line-height: 1.15; }
  p { margin: 0 0 14px; color: var(--muted); line-height: 1.7; }
  a {
    display: inline-flex;
    margin-top: 8px;
    padding: 12px 18px;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    font-weight: 600;
  }
</style>
</head>
<body>
  <main class="card">
    <h1>AI Native Learning Program</h1>
    <p>This standalone export is no longer the source of truth.</p>
    <p>The maintained curriculum now lives in the static site so content, review metadata, and lesson structure stay in sync.</p>
    <a href="./ai-native-site/index.html">Open the current site</a>
  </main>
</body>
</html>
