<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0f0e17;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .bg-glow {
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(91,82,240,0.25) 0%, transparent 70%);
    top: -100px;
    left: -100px;
    pointer-events: none;
  }
  .bg-glow-2 {
    position: absolute;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(91,82,240,0.12) 0%, transparent 70%);
    bottom: -80px;
    right: 80px;
    pointer-events: none;
  }
  .card {
    position: relative;
    z-index: 1;
    padding: 70px 80px;
    width: 100%;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(91,82,240,0.15);
    border: 1px solid rgba(91,82,240,0.4);
    border-radius: 100px;
    padding: 6px 16px;
    margin-bottom: 32px;
    color: #a89cf0;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  .badge-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #5b52f0;
  }
  .title-row {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
  }
  .emoji {
    font-size: 64px;
    line-height: 1;
  }
  h1 {
    font-size: 72px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1.05;
    letter-spacing: -0.03em;
  }
  h1 span {
    color: #5b52f0;
  }
  .subtitle {
    font-size: 26px;
    color: rgba(255,255,255,0.55);
    font-weight: 400;
    margin-bottom: 48px;
    line-height: 1.4;
    max-width: 700px;
  }
  .stats {
    display: flex;
    gap: 48px;
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .stat-num {
    font-size: 40px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .stat-label {
    font-size: 15px;
    color: rgba(255,255,255,0.4);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .stat-divider {
    width: 1px;
    background: rgba(255,255,255,0.12);
    align-self: stretch;
  }
  .url {
    position: absolute;
    bottom: 40px;
    right: 80px;
    font-size: 16px;
    color: rgba(255,255,255,0.25);
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .accent-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #5b52f0, #8b7ff0, #5b52f0);
  }
</style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-glow-2"></div>
  <div class="card">
    <div class="badge">
      <div class="badge-dot"></div>
      Free · Self-paced · No login required
    </div>
    <div class="title-row">
      <div class="emoji">🧠</div>
      <h1>Become <span>AI Native</span></h1>
    </div>
    <p class="subtitle">A complete program to transform how you work with AI — from foundations to leadership.</p>
    <div class="stats">
      <div class="stat">
        <div class="stat-num">21</div>
        <div class="stat-label">Modules</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-num">105</div>
        <div class="stat-label">Lessons</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-num">5–7</div>
        <div class="stat-label">Weeks</div>
      </div>
    </div>
  </div>
  <div class="url">ai-native-site.vercel.app</div>
  <div class="accent-bar"></div>
</body>
</html>
